name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  native-unit-and-bench:
    runs-on: macos-15
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode 26.x
        run: |
          ls -1 /Applications | grep '^Xcode' || true

          selected=""
          for candidate in \
            /Applications/Xcode_26.3.app \
            /Applications/Xcode_26.2.app \
            /Applications/Xcode_26.2.0.app
          do
            if [ -d "$candidate" ]; then
              selected="$candidate"
              break
            fi
          done

          if [ -z "$selected" ]; then
            echo "Expected Xcode 26.2+ on the runner, but no supported install was found." >&2
            exit 1
          fi

          sudo xcode-select -s "$selected/Contents/Developer"
          xcodebuild -version

      - name: Ensure XcodeGen
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate project
        run: xcodegen

      - name: Native unit-only suite
        run: ./scripts/test-native-editor.sh --unit-only

      - name: Strict markdown spec conformance
        run: ./scripts/test-markdown-spec-conformance.sh

      - name: Typing behavior gate
        run: ./scripts/run-typing-behavior-gate.sh --lane pr

      - name: kern-bench package tests
        run: cd scripts/kern-bench && swift test -c release
