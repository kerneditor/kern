name: KernTextKit
options:
  minimumXcodeGenVersion: 2.45.0
  bundleIdPrefix: com.gradigit.kern
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"

packages:
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    exactVersion: 1.18.9

schemes:
  KernTextKit:
    build:
      targets:
        KernTextKit: all
    test:
      targets:
        - KernTextKitTests
  KernTextKitSnapshots:
    build:
      targets:
        KernTextKit: all
    test:
      targets:
        - KernTextKitTests
      environmentVariables:
        KERN_ENABLE_SNAPSHOT_TESTS: "1"
  KernTextKitRecordSnapshots:
    build:
      targets:
        KernTextKit: all
    test:
      targets:
        - KernTextKitTests
      environmentVariables:
        KERN_ENABLE_SNAPSHOT_TESTS: "1"
        KERN_RECORD_SNAPSHOTS: "1"
  KernTextKitExhaustive:
    build:
      targets:
        KernTextKit: all
    test:
      targets:
        - KernTextKitTests
      environmentVariables:
        KERN_ENABLE_EXHAUSTIVE_TESTS: "1"
        KERN_TYPING_COVERAGE_LANE: "pr"
        KERN_TYPING_STATEFUL_ENFORCE: "1"
        KERN_TYPING_STATEFUL_SEEDS: "24"
        KERN_TYPING_STATEFUL_STEPS: "50"
        KERN_EXHAUSTIVE_ACTION_SCENARIO_BUDGET: "1000"
        KERN_EXHAUSTIVE_ACTION_LOG_LIMIT: "1200"
        KERN_EXHAUSTIVE_ACTION_PROGRESS_EVERY: "2000"
        KERN_EXHAUSTIVE_ACTION_EXPORT_INTERVAL: "4"
        KERN_EXHAUSTIVE_ACTION_ROUNDTRIP_INTERVAL: "16"
        KERN_EXHAUSTIVE_ULTIMATE_PROFILE_LIMIT: "16"
        KERN_EXHAUSTIVE_ULTIMATE_CHAR_LIMIT: "24000"
        KERN_EXHAUSTIVE_INTERLEAVED_PROFILE_LIMIT: "6"
        KERN_EXHAUSTIVE_INTERLEAVED_PROGRAM_LIMIT: "4"
        KERN_EXHAUSTIVE_ULTIMATE_INTERLEAVED_CHAR_LIMIT: "10000"
        KERN_EXHAUSTIVE_MEGA_CHAR_LIMIT: "40000"
        KERN_EXHAUSTIVE_MEGA_INTERLEAVED_CHAR_LIMIT: "45000"
  KernTextKitUltraExhaustive:
    build:
      targets:
        KernTextKit: all
    test:
      targets:
        - KernTextKitTests
      environmentVariables:
        KERN_ENABLE_EXHAUSTIVE_TESTS: "1"
        KERN_TYPING_COVERAGE_LANE: "nightly"
        KERN_TYPING_STATEFUL_ENFORCE: "1"
        KERN_TYPING_STATEFUL_SEEDS: "120"
        KERN_TYPING_STATEFUL_STEPS: "120"
        KERN_ENABLE_MEGA_ALL_PROFILE_MATRIX: "1"
        KERN_EXHAUSTIVE_MEGA_ALL_PROFILE_LIMIT: "4"
        KERN_EXHAUSTIVE_MEGA_ALL_PROFILE_PROGRAM_LIMIT: "4"
        KERN_EXHAUSTIVE_ACTION_SCENARIO_BUDGET: "6000"
        KERN_EXHAUSTIVE_ACTION_LOG_LIMIT: "3000"
        KERN_EXHAUSTIVE_ACTION_EXPORT_INTERVAL: "2"
        KERN_EXHAUSTIVE_ACTION_ROUNDTRIP_INTERVAL: "8"
        KERN_EXHAUSTIVE_ULTIMATE_PROFILE_LIMIT: "64"
        KERN_EXHAUSTIVE_ULTIMATE_CHAR_LIMIT: "9999999"
        KERN_EXHAUSTIVE_INTERLEAVED_PROFILE_LIMIT: "32"
        KERN_EXHAUSTIVE_INTERLEAVED_PROGRAM_LIMIT: "8"
        KERN_EXHAUSTIVE_ULTIMATE_INTERLEAVED_CHAR_LIMIT: "9999999"
        KERN_ENABLE_MEGA_CHAR_BY_CHAR: "1"
        KERN_EXHAUSTIVE_MEGA_CHAR_LIMIT: "9999999"
        KERN_EXHAUSTIVE_MEGA_INTERLEAVED_CHAR_LIMIT: "100000"
  KernTextKitUltraExhaustiveFull:
    build:
      targets:
        KernTextKit: all
    test:
      targets:
        - KernTextKitTests
      environmentVariables:
        KERN_ENABLE_EXHAUSTIVE_TESTS: "1"
        KERN_TYPING_COVERAGE_LANE: "nightly"
        KERN_TYPING_STATEFUL_ENFORCE: "1"
        KERN_TYPING_STATEFUL_SEEDS: "500"
        KERN_TYPING_STATEFUL_STEPS: "200"
        KERN_ENABLE_MEGA_ALL_PROFILE_MATRIX: "1"
        KERN_EXHAUSTIVE_MEGA_ALL_PROFILE_LIMIT: "9999"
        KERN_EXHAUSTIVE_MEGA_ALL_PROFILE_PROGRAM_LIMIT: "9999"
        KERN_EXHAUSTIVE_ACTION_FULL: "1"
        KERN_EXHAUSTIVE_ACTION_LOG_LIMIT: "5000"
        KERN_EXHAUSTIVE_ACTION_EXPORT_INTERVAL: "1"
        KERN_EXHAUSTIVE_ACTION_ROUNDTRIP_INTERVAL: "1"
        KERN_EXHAUSTIVE_ULTIMATE_FULL: "1"
        KERN_EXHAUSTIVE_ULTIMATE_INTERLEAVED_FULL: "1"
        KERN_EXHAUSTIVE_ULTIMATE_CHAR_LIMIT: "9999999"
        KERN_EXHAUSTIVE_ULTIMATE_INTERLEAVED_CHAR_LIMIT: "9999999"
        KERN_ENABLE_MEGA_CHAR_BY_CHAR: "1"
        KERN_EXHAUSTIVE_MEGA_CHAR_LIMIT: "9999999"
        KERN_EXHAUSTIVE_MEGA_INTERLEAVED_CHAR_LIMIT: "9999999"
  KernTextKitSnapshotsExhaustive:
    build:
      targets:
        KernTextKit: all
    test:
      targets:
        - KernTextKitTests
      environmentVariables:
        KERN_ENABLE_EXHAUSTIVE_TESTS: "1"
        KERN_ENABLE_SNAPSHOT_TESTS: "1"
  KernTextKitRecordSnapshotsExhaustive:
    build:
      targets:
        KernTextKit: all
    test:
      targets:
        - KernTextKitTests
      environmentVariables:
        KERN_ENABLE_EXHAUSTIVE_TESTS: "1"
        KERN_ENABLE_SNAPSHOT_TESTS: "1"
        KERN_RECORD_SNAPSHOTS: "1"
  KernTextKitPerf:
    build:
      targets:
        KernTextKit: all
    test:
      targets:
        - KernTextKitTests
      environmentVariables:
        KERN_ENABLE_PERF_TESTS: "1"
        KERN_PERF_ITERATIONS: "3"
        KERN_PERF_BENCHMARK_RENDER_CHAR_LIMIT: "24000"
        KERN_PERF_STRESS_RENDER_CHAR_LIMIT: "24000"
        KERN_PERF_ULTIMATE_RENDER_CHAR_LIMIT: "32000"
        KERN_PERF_MEGA_RENDER_CHAR_LIMIT: "50000"
        KERN_PERF_MEGA_SCROLL_CHAR_LIMIT: "70000"
        KERN_PERF_ULTIMATE_CHAR_LIMIT: "15000"
        KERN_PERF_ULTIMATE_INTERLEAVED_CHAR_LIMIT: "12000"
        KERN_PERF_MEGA_CHAR_LIMIT: "30000"
        KERN_PERF_MEGA_INTERLEAVED_CHAR_LIMIT: "20000"
targets:
  KernTextKit:
    type: application
    platform: macOS
    sources:
      - path: KernApp/Sources
      - path: KernApp/Resources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_STRICT_CONCURRENCY: complete
        INFOPLIST_FILE: KernApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: KernApp/Kern.entitlements
        CODE_SIGN_IDENTITY: "-"
        PRODUCT_BUNDLE_IDENTIFIER: com.gradigit.kern
        PRODUCT_NAME: Kern
        PRODUCT_MODULE_NAME: KernTextKit
        GENERATE_INFOPLIST_FILE: false
      configs:
        Release:
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: "NO"

  KernTextKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: KernTests
    dependencies:
      - target: KernTextKit
      - package: SnapshotTesting
      - sdk: libz.tbd
    settings:
      base:
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_IDENTITY: "-"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Kern.app/Contents/MacOS/Kern"
        BUNDLE_LOADER: "$(TEST_HOST)"
